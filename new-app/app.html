<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>posse dance academy - 管理システム</title>
    <link rel="stylesheet" href="css/style.css?v=18">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        /* Override Tailwind defaults that conflict with our Apple design */
        .main-content h2 { font-size: 42px; font-weight: 800; letter-spacing: -0.03em; color: var(--text-primary); }
        .stat-card { background: var(--card); border-radius: var(--radius); }
        /* Fix input text color - Tailwind inherits parent's light color on dark bg */
        input, select, textarea, .form-input, .form-select { color: #111827 !important; background-color: #ffffff !important; }
        input::placeholder { color: #9ca3af !important; }
    </style>
</head>
<body>
    <div id="app">
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:var(--bg);">
            <div style="text-align:center;">
                <div class="loading-spinner" style="margin:0 auto 24px;"></div>
                <p style="color:var(--text-secondary);font-size:15px;">読み込み中...</p>
            </div>
        </div>
    </div>
    <script type="module" src="js/app.js?v=48"></script>
</body>
</html>
